name: Update "Recently shipped"

on:
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC
  workflow_dispatch: {}

# Needed for the job to push the regenerated README back to the repo.
permissions:
  contents: write

# Avoid overlapping runs racing on the same file.
concurrency:
  group: update-readme
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate Recently shipped section
        env:
          # Default token: pushes made with it do NOT re-trigger workflows,
          # so there is no commit loop. Used only to raise the API rate limit.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-recent.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "No README changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: refresh Recently shipped [skip ci]"
          git push
